<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lost Luggage</title>

<style>
:root{
    --bg:#3e2a75;
    --card:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --border:#e5e7eb;
    --shadow:0 10px 30px rgba(0,0,0,.12);
}

@media (prefers-color-scheme: dark){
    :root{
        --bg:#0f172a;
        --card:#1e293b;
        --text:#f8fafc;
        --muted:#cbd5e1;
        --border:#334155;
        --shadow:0 10px 30px rgba(0,0,0,.4);
    }
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:32px;
    box-shadow:var(--shadow);
    text-align:center;
}

.icon{
    font-size:64px;
    margin-bottom:12px;
}

h1{
    margin-bottom:10px;
}

.subtitle{
    color:var(--muted);
    margin-bottom:24px;
    line-height:1.5;
}

.details{
    background:rgba(127,127,127,.08);
    border-radius:16px;
    padding:18px;
    margin-bottom:24px;
}

.details p{
    margin:10px 0;
    word-wrap:break-word;
}

.details a{
    color:inherit;
}

.actions{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.button{
    display:block;
    text-decoration:none;
    color:white;
    font-weight:700;
    padding:16px;
    border-radius:14px;
    transition:transform .2s ease;
}

.button:hover{
    transform:translateY(-2px);
}

.call{
    background:#2563eb;
}

.whatsapp{
    background:#25D366;
}

.email{
    background:#ea4335;
}

.footer{
    margin-top:20px;
    color:var(--muted);
    font-size:.9rem;
}
</style>

</head>

<body>

<div class="card">

```
<div class="icon">🧳</div>

<p class="subtitle">
    If you've found this luggage, please contact me using one of the options below.
</p>

<div class="details">

    <p>
        <strong>Name:</strong><br>
        Shaun Bradley-Clark
    </p>

    <p>
        <strong>Phone:</strong><br>
        <a href="tel:+447572115312">
            +44 7572115312
        </a>
    </p>

    <p>
        <strong>Email:</strong><br>
        <a href="mailto:Shaun.BradleyClark@gmail.com">
            Shaun.BradleyClark@gmail.com
        </a>
    </p>

</div>

<div class="actions">

    <a class="button call"
       href="tel:+447700123456">
       📞 Call Me
    </a>

    <a class="button whatsapp"
       href="https://wa.me/447572115312">
       💬 WhatsApp
    </a>

    <a class="button email"
       href="mailto:Shaun.BradleyClark@gmail.com?subject=Lost%20Luggage">
       ✉️ Email Me
    </a>

</div>

<div class="footer">
    Thank you for helping return my luggage.
</div>
```

</div>

</body>
</html>
